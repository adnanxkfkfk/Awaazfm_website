<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awaaz FM - Opening...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    .card {
      text-align: center;
      padding: 48px 32px;
      max-width: 400px;
      background: rgba(255,255,255,0.06);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px; font-weight: bold;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">A</div>
    <div class="spinner"></div>
    <h1>Opening in Awaaz FM</h1>
    <p>If the app doesn't open automatically, tap the button below.</p>
    <a class="btn" id="openBtn" href="#">Open in App</a>
  </div>

  <script>
    // Extract the short code from the current URL path (/s/CODE)
    const path = window.location.pathname;
    const code = path.split('/s/')[1];

    if (code) {
      // Build the deep link URI (custom scheme fallback)
      const deepLink = `awaazfm://share/${code}`;
      const appLink = window.location.href; // The HTTPS URL itself is the App Link

      // Set the button href
      document.getElementById('openBtn').href = deepLink;

      // Try to open the app via intent (Android)
      const intentUrl = `intent://share/${code}#Intent;scheme=awaazfm;package=com.rapidredy.radio.awaazfm.in;end`;
      
      // Attempt App Link first (the current page URL), then fallback to intent
      setTimeout(() => {
        window.location.href = intentUrl;
      }, 1500);
    }
  </script>
</body>
</html>

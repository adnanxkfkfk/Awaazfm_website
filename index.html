<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming App UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Native-like constraints and scrollbar hiding */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        body {
            background-color: #111; /* Darker outer bg */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overscroll-behavior-y: none; /* Prevents native browser pull-to-refresh bounce */
            -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on mobile */
            user-select: none; /* Prevents accidental text selection while swiping */
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { 
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; 
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-hero-zoom { animation: slowZoom 25s ease-in-out infinite; }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 33.333%; }
        }
        .animate-progress { animation: fillProgress 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(234,179,8,0.5); transform: rotate(-2deg) scale(1); }
            50% { box-shadow: 0 0 25px rgba(234,179,8,0.9); transform: rotate(-2deg) scale(1.05); }
        }
        .animate-glow { animation: pulseGlow 2.5s infinite; }
    </style>
</head>
<body>

    <!-- Main Device Container -->
    <div class="w-full max-w-[414px] h-[100dvh] bg-[#0b0b0b] relative overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.8)] flex flex-col text-white sm:h-[896px] sm:rounded-[40px] sm:border-[8px] sm:border-gray-900">
        
        <main class="flex-1 overflow-y-auto hide-scrollbar pt-4 pb-12 relative z-10">
            
            <!-- Hero Carousel -->
            <section class="mt-4 px-4 flex overflow-x-auto snap-x snap-mandatory gap-3 hide-scrollbar animate-fade-in">
                
                <!-- Hero Card 1 -->

                    <div class="absolute inset-x-0 bottom-0 h-2/3 bg-gradient-to-t from-black/95 via-black/50 to-transparent flex flex-col justify-end p-4 pb-6">
                        <p class="text-center text-lg font-medium text-gray-200 mb-6 drop-shadow-md transition-transform duration-500">kya?</p>
                        <div class="flex justify-center w-full">
                            <div class="bg-gradient-to-r from-yellow-500 to-orange-500 text-black font-extrabold px-6 py-2 rounded-full text-sm border-2 border-yellow-200 shadow-[0_0_15px_rgba(234,179,8,0.5)] transform -rotate-2 animate-glow">

                        </div>
                    </div>

                    <!-- Mute Button -->

                            <line x1="23" y1="9" x2="17" y2="15"></line>
                            <line x1="17" y1="9" x2="23" y2="15"></line>
                        </svg>

                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>

                        <span class="absolute left-[-10px] text-[180px] font-black tracking-tighter text-[#0b0b0b] z-0 select-none pointer-events-none drop-shadow-md transition-colors duration-300" style="-webkit-text-stroke: 4px #555; line-height: 1; top: -26px;">4</span>
                        <div class="relative w-[105px] aspect-[3/4] ml-auto rounded-md overflow-hidden bg-gray-800 shadow-[4px_0_15px_rgba(0,0,0,0.6)] border border-gray-700/50 z-10 transition-shadow duration-300">
                            <img src="https://images.unsplash.com/photo-1533134486753-c833f0ed4866?q=80&w=400&auto=format&fit=crop" alt="Immortal for 3000 Years" class="w-full h-full object-cover transition-transform duration-700" loading="lazy" />

                                29.1L

                    </div>

                        <span class="absolute left-[-10px] text-[180px] font-black tracking-tighter text-[#0b0b0b] z-0 select-none pointer-events-none drop-shadow-md transition-colors duration-300" style="-webkit-text-stroke: 4px #555; line-height: 1; top: -26px;">5</span>
                        <div class="relative w-[105px] aspect-[3/4] ml-auto rounded-md overflow-hidden bg-gray-800 shadow-[4px_0_15px_rgba(0,0,0,0.6)] border border-gray-700/50 z-10 transition-shadow duration-300">
                            <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=400&auto=format&fit=crop" alt="Dulhan Se Darling" class="w-full h-full object-cover transition-transform duration-700" loading="lazy" />
                            <div class="absolute bottom-1 right-1 bg-black/60 px-1.5 py-0.5 rounded text-[10px] font-medium flex items-center gap-0.5 backdrop-blur-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>

            <!-- New Genre Section -->

                <div class="grid grid-cols-3 gap-x-2.5 gap-y-6">
                    
                    <!-- Genre Item 1 -->
                    <div class="flex flex-col gap-1.5 cursor-pointer active:scale-95 transition-all duration-300">
                        <div class="relative aspect-[3/4] rounded-lg overflow-hidden bg-gray-800 border border-gray-800 shadow-sm transition-shadow duration-300">
                            <img src="https://images.unsplash.com/photo-1533134486753-c833f0ed4866?q=80&w=400&auto=format&fit=crop" alt="Immortal for 3000 Years" class="w-full h-full object-cover transition-transform duration-700" loading="lazy" />

                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>

</body>
</html>
